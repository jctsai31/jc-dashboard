name: Update dashboard data

# 每月自動從 FRED 抓最新數據並寫回 pce-nasdaq.html
on:
  schedule:
    # 每月 1 號與 5 號 13:00 UTC 各跑一次
    # （PCE 通常隔月底公布，跑兩次確保抓到最新）
    - cron: '0 13 1 * *'
    - cron: '0 13 5 * *'
  workflow_dispatch:   # 也可在 Actions 頁面手動觸發

permissions:
  contents: write       # 允許 workflow commit 回 repo

# 提前採用 Node.js 24，讓 actions 不再跳「Node 20 即將淘汰」警告
# （GitHub 預計 2026-09 移除 Node 20，這行讓我們現在就無痛過渡）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run update script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pce-nasdaq.html; then
            echo "資料無變化，略過 commit"
          else
            git add pce-nasdaq.html
            git commit -m "chore: 自動更新 PCE / Nasdaq / HY OAS 數據"
            git push
          fi
